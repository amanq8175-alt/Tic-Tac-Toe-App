<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="game.png">
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div class="scoreboard">
    <div class="score-card x"><div class="score-label">Player X</div><div class="score-value" id="score-x">0</div></div>
    <div class="score-card draw"><div class="score-label">Draws</div><div class="score-value" id="score-draw">0</div></div>
    <div class="score-card o"><div class="score-label">Player O</div><div class="score-value" id="score-o">0</div></div>
  </div>
  <div class="status" id="status">X's turn</div>
  <div class="board" id="board"></div>
  <div class="controls">
    <button class="btn" onclick="newGame()">🔄 New Game</button>
    <button class="btn" onclick="resetAll()">🏆 Reset Scores</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
